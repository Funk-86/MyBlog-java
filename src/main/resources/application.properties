spring.application.name=MyBlog

# 上传文件根目录，Zeabur 等容器环境若工作目录只读，可设 UPLOAD_BASE_PATH=/tmp
upload.base-path=${UPLOAD_BASE_PATH:.}

# ??????????????????? 200MB???? 200MB?
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

#MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:blog}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:${MYSQL_USERNAME:root}}
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ??????
hot.weights.view=1
hot.weights.like=5
hot.weights.comment=3
hot.weights.favorite=4
hot.weights.read50=0
hot.weights.read90=0
hot.time-decay=1.5
# Wilson ??????????????0=????z ????????1.96?95%?
hot.wilson-weight=0.5
hot.wilson-z=1.96
# ??? + ???????? ??0=?????1=?????
hot.mix-alpha=0.7
hot.zset-key=zset:post:hot
hot.view-key-prefix=post:view:

# 视频上传：超过额定大小后自动转码降画质（需要服务器有 ffmpeg）
video.upload.rated-size-mb=50
video.upload.transcode.max-side=720
video.upload.transcode.crf=28
video.upload.transcode.audio-bitrate-k=96

